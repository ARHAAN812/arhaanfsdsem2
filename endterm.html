<!DOCTYPE html>
<html   lang="en.">
<head>
    <title>Prime Number Checker</title>
    <style>
        body { 
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding-top: 50px;
        }
        .box {
            background: white;
            max-width: 400px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input, button {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Prime Number Checker</h2>000000000....0
    <p>Enter a positive integer to check if it is prime.</p>
    
    <input type="number" id="userInput" placeholder="e.g., 2">
    <button onclick="checkPrime()">Check Number</button>
    
    <div id="result"></div>
</div>

<script>
    function checkPrime() {
        const input = document.getElementById('userInput').value;
        const resultDiv = document.getElementById('result');
        

        const num = parseInt(input);

        if (input === "" || isNaN(num)) {
            resultDiv.innerHTML = "<span style='color: red;'>Please enter a number.</span>";
            return;
        }
        if (num <= 1) {
            resultDiv.innerHTML = `${num} is <b>not</b> prime (must be greater than 1).`;
            return;
        }
        let isPrime = true;
    
        for (let i = 2; i <= Math.sqrt(num); i++) {
            if (num % i === 0) {
                isPrime = false;
                break;
            }
        }

        if (isPrime) {
            resultDiv.innerHTML = `<span style='color: green;'>🎉 ${num} is a Prime Number!</span>`;
        } else {
            resultDiv.innerHTML = `<span style='color: #d9534f;'>❌ ${num} is NOT a Prime Number.</span>`;
        }
    }
</script>

</body>
</html>
